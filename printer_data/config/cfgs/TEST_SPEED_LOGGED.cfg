[gcode_macro TEST_SPEED_LOGGED]
description: Test speed and log result to file
gcode:
    {% set speed = params.SPEED|default(200)|int %}
    {% set accel = params.ACCEL|default(3000)|int %}
    {% set iterations = params.ITERATIONS|default(3)|int %}
    
    SAVE_GCODE_STATE NAME=TEST_SPEED_LOGGED
    
    G28
    G4 P2000
    
    {% set x_min = printer.toolhead.axis_minimum.x + 20 %}
    {% set x_max = printer.toolhead.axis_maximum.x - 20 %}
    {% set y_min = printer.toolhead.axis_minimum.y + 20 %}
    {% set y_max = printer.toolhead.axis_maximum.y - 20 %}
    
    G0 X{x_min} Y{y_min} F{speed*60}
    
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel}
    
    {% for i in range(iterations) %}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    {% endfor %}
    
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel}
    
    G28
    G4 P2000
    
    { action_respond_info("TEST_SPEED_LOGGED: SPEED=" ~ speed ~ " ACCEL=" ~ accel ~ " ITER=" ~ iterations ~ " COMPLETED - Check /tmp/test_speed_result.txt") }
    
    RESTORE_GCODE_STATE NAME=TEST_SPEED_LOGGED
